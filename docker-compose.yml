services:
  db:
    image: postgres:16-alpine
    restart: on-failure
    env_file: .env
    environment:
      - POSTGRES_PASSWORD=${PG_PASSWORD}
      - POSTGRES_USER=${PG_USER}
      - POSTGRES_DB=${PG_DATABASE}
    ports:
      - "5432:5432"
    volumes:
      - todo_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d ${PG_DATABASE} -U ${PG_USER}" ]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    networks:
      - todo_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/usr/app
      - /usr/app/node_modules
    ports:
      - "8888:3000"
    depends_on:
      - db
    networks:
      - todo_network

volumes:
  todo_data:

networks:
  todo_network:
    driver: bridge
